<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>測試資料注入工具</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; background: #f5f5f5; }
        h2 { color: #ff6b00; }
        button { background: #ff6b00; color: white; border: none; padding: 14px 28px; border-radius: 10px; font-size: 1em; font-weight: 700; cursor: pointer; margin: 8px 4px; }
        button.danger { background: #e53935; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #auth-bar { background: white; border-radius: 10px; padding: 14px 16px; margin-bottom: 16px; border: 1px solid #ddd; display: flex; align-items: center; justify-content: space-between; }
        #auth-bar img { width: 32px; height: 32px; border-radius: 50%; margin-right: 10px; vertical-align: middle; }
        .google-btn { background: white; color: #555; border: 1px solid #ddd; display: inline-flex; align-items: center; gap: 8px; padding: 10px 18px; border-radius: 8px; font-size: 0.95em; font-weight: 600; cursor: pointer; }
        #action-btns { display: none; }
        #log { background: white; border-radius: 10px; padding: 16px; margin-top: 20px; min-height: 100px; font-size: 0.85em; line-height: 1.8; border: 1px solid #ddd; white-space: pre-wrap; }
        .ok { color: #2e7d32; } .err { color: #c62828; } .info { color: #1565c0; }
        .card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; border: 1px solid #ddd; }
        label { font-size: 0.85em; font-weight: 600; color: #666; display: block; margin-bottom: 4px; }
        input { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.9em; box-sizing: border-box; margin-bottom: 12px; }
    </style>
</head>
<body>
    <h2>🏀 教練助手 — 測試資料工具</h2>

    <div id="auth-bar">
        <div id="auth-status">尚未登入</div>
        <button class="google-btn" id="loginBtn" onclick="login()">
            <svg width="18" height="18" viewBox="0 0 18 18"><path d="M17.64 9.2c0-.637-.057-1.252-.164-1.841H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.715H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/><path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.448 2.797 1.237 3.917l2.727-2.207z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.159 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
            Google 登入
        </button>
    </div>

    <div class="card">
        <label>Boss UID（老闆 Firebase UID）</label>
        <input id="bossUid" value="HHuKOAblZacETnPawLSrkfwhUY63">
        <label>Boss 名稱</label>
        <input id="bossName" value="3312 samuel">
        <label>Coach 1 UID</label>
        <input id="coachUid" value="SejVeoowbUg2jzVnD74Rw9Xhuev1">
        <label>Coach 1 名稱</label>
        <input id="coachName" value="Sam Sam">
        <label>Coach 2 UID（可選，用於多教練課程）</label>
        <input id="coach2Uid" value="">
        <label>Coach 2 名稱</label>
        <input id="coach2Name" value="">
    </div>

    <div id="action-btns">
        <button onclick="seedAll()">🚀 注入所有測試資料</button>
        <button class="danger" onclick="clearAll()">🗑️ 清除測試資料</button>
    </div>
    <div id="login-hint" style="color:#999; font-size:0.9em; margin: 8px 0;">請先登入才能操作</div>

    <div id="log">等待操作…</div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBxPz6RfW4ph-T53b1s2Pzaw7-deX-iJxE",
            authDomain: "coach-helper-ffcdb.firebaseapp.com",
            projectId: "coach-helper-ffcdb",
            storageBucket: "coach-helper-ffcdb.firebasestorage.app",
            messagingSenderId: "320161236086",
            appId: "1:320161236086:web:79b98040f780ba78d10b57"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const logEl = document.getElementById('log');
        const seededIds = { logs: [], schedule: [], courses: [], users: [] };

        // Auth state
        auth.onAuthStateChanged(user => {
            const statusEl = document.getElementById('auth-status');
            const loginBtn = document.getElementById('loginBtn');
            const actionBtns = document.getElementById('action-btns');
            const loginHint = document.getElementById('login-hint');
            if (user) {
                statusEl.innerHTML = `<img src="${user.photoURL || ''}" onerror="this.style.display='none'"> <strong>${user.displayName || user.email}</strong>`;
                loginBtn.textContent = '登出';
                loginBtn.onclick = () => auth.signOut();
                actionBtns.style.display = 'block';
                loginHint.style.display = 'none';
            } else {
                statusEl.textContent = '尚未登入';
                loginBtn.innerHTML = `<svg width="18" height="18" viewBox="0 0 18 18"><path d="M17.64 9.2c0-.637-.057-1.252-.164-1.841H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.715H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/><path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.448 2.797 1.237 3.917l2.727-2.207z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.159 6.656 3.58 9 3.58z" fill="#EA4335"/></svg> Google 登入`;
                loginBtn.onclick = login;
                actionBtns.style.display = 'none';
                loginHint.style.display = 'block';
            }
        });

        function login() {
            auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())
                .catch(e => alert('登入失敗: ' + e.message));
        }

        function print(msg, cls = '') {
            logEl.innerHTML += `<span class="${cls}">${msg}</span>\n`;
            logEl.scrollTop = logEl.scrollHeight;
        }

        function calcHours(start, end) {
            const diff = (new Date(`2000/01/01 ${end}`) - new Date(`2000/01/01 ${start}`)) / 3600000;
            return (diff < 0 ? diff + 24 : diff).toFixed(2);
        }

        async function seedAll() {
            logEl.innerHTML = '';
            document.querySelectorAll('button').forEach(b => b.disabled = true);

            const bossUid  = document.getElementById('bossUid').value.trim();
            const bossName = document.getElementById('bossName').value.trim();
            const coachUid = document.getElementById('coachUid').value.trim();
            const coachName = document.getElementById('coachName').value.trim();
            const coach2Uid = document.getElementById('coach2Uid').value.trim();
            const coach2Name = document.getElementById('coach2Name').value.trim();

            print('開始注入測試資料…', 'info');

            // ── 0. 建立假教練用戶 (users) ─────────────────────────
            print('\n👤 建立假教練用戶…', 'info');

            const fakeCoaches = [
                { uid: 'seed_coach_alpha', name: '陳小明', email: 'coach_alpha@test.com', photoURL: '' },
                { uid: 'seed_coach_beta',  name: '李大偉', email: 'coach_beta@test.com',  photoURL: '' },
                { uid: 'seed_coach_gamma', name: '張美玲', email: 'coach_gamma@test.com', photoURL: '' },
            ];

            for (const fc of fakeCoaches) {
                try {
                    await db.collection('users').doc(fc.uid).set({
                        uid: fc.uid,
                        name: fc.name,
                        email: fc.email,
                        photoURL: fc.photoURL,
                        role: 'coach',
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    seededIds.users.push(fc.uid);
                    print(`  ✓ 假教練「${fc.name}」(${fc.uid})`, 'ok');
                } catch(e) { print(`  ✗ 用戶 ${fc.name}: ${e.message}`, 'err'); }
            }

            // 自動填入 Coach 2 欄位（如果空白）
            if (!coach2Uid) {
                document.getElementById('coach2Uid').value = fakeCoaches[0].uid;
                document.getElementById('coach2Name').value = fakeCoaches[0].name;
            }
            const effectiveCoach2Uid = coach2Uid || fakeCoaches[0].uid;
            const effectiveCoach2Name = coach2Name || fakeCoaches[0].name;

            // ── 1. 建立課程 (courses) ──────────────────────────
            print('\n📚 建立課程…', 'info');

            const coaches1 = [{ uid: coachUid, name: coachName, email: '', photoURL: '' }];
            coaches1.push({ uid: effectiveCoach2Uid, name: effectiveCoach2Name, email: '', photoURL: '' });

            // 課程 A：籃球基礎班（1月-2月，週一週三）
            const courseADates = [];
            const aStart = new Date('2026-01-05T00:00:00');
            const aEnd = new Date('2026-02-28T00:00:00');
            for (let d = new Date(aStart); d <= aEnd; d.setDate(d.getDate() + 1)) {
                if (d.getDay() === 1 || d.getDay() === 3) {
                    courseADates.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`);
                }
            }

            const courseAId = `seed_course_A_${Date.now()}`;
            const courseAData = {
                name: '籃球基礎班',
                bossUid, bossName,
                location: '九龍灣體育館',
                start: '09:00', end: '11:00',
                coaches: coaches1,
                dates: courseADates,
                dateRangeStart: '2026-01-05', dateRangeEnd: '2026-02-28',
                weekdays: [1, 3],
                status: 'active',
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            try {
                await db.collection('courses').doc(courseAId).set(courseAData);
                seededIds.courses.push(courseAId);
                print(`  ✓ 課程「籃球基礎班」${courseADates.length} 個日期，${coaches1.length} 位教練`, 'ok');
            } catch(e) { print(`  ✗ 課程 A: ${e.message}`, 'err'); }

            // 課程 B：進階訓練班（2月-3月，週二週四）
            const courseBDates = [];
            const bStart = new Date('2026-02-03T00:00:00');
            const bEnd = new Date('2026-03-31T00:00:00');
            for (let d = new Date(bStart); d <= bEnd; d.setDate(d.getDate() + 1)) {
                if (d.getDay() === 2 || d.getDay() === 4) {
                    courseBDates.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`);
                }
            }

            const courseBId = `seed_course_B_${Date.now()}`;
            const courseBData = {
                name: '進階訓練班',
                bossUid, bossName,
                location: '沙田體育館',
                start: '14:00', end: '16:00',
                coaches: [
                    { uid: coachUid, name: coachName, email: '', photoURL: '' },
                    { uid: fakeCoaches[1].uid, name: fakeCoaches[1].name, email: fakeCoaches[1].email, photoURL: '' }
                ],
                dates: courseBDates,
                dateRangeStart: '2026-02-03', dateRangeEnd: '2026-03-31',
                weekdays: [2, 4],
                status: 'active',
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            try {
                await db.collection('courses').doc(courseBId).set(courseBData);
                seededIds.courses.push(courseBId);
                print(`  ✓ 課程「進階訓練班」${courseBDates.length} 個日期`, 'ok');
            } catch(e) { print(`  ✗ 課程 B: ${e.message}`, 'err'); }

            // 課程 C：青少年週末班（3月，手動日期，已封存）
            const courseCDates = ['2026-03-07', '2026-03-14', '2026-03-21', '2026-03-28'];
            const courseCId = `seed_course_C_${Date.now()}`;
            const courseCData = {
                name: '青少年週末班',
                bossUid, bossName,
                location: '將軍澳體育館',
                start: '10:00', end: '12:00',
                coaches: [{ uid: coachUid, name: coachName, email: '', photoURL: '' }],
                dates: courseCDates,
                status: 'archived',
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            try {
                await db.collection('courses').doc(courseCId).set(courseCData);
                seededIds.courses.push(courseCId);
                print(`  ✓ 課程「青少年週末班」4 個日期（已封存）`, 'ok');
            } catch(e) { print(`  ✗ 課程 C: ${e.message}`, 'err'); }

            // ── 2. 建立課程排課條目 (schedule) ─────────────────────
            print('\n📅 建立排課條目…', 'info');

            let schCount = 0;

            // 課程 A 排課
            for (const date of courseADates) {
                for (const coach of coaches1) {
                    const id = `seed_sch_${Date.now()}_${schCount}`;
                    const isSub = (date === '2026-02-17' && coach.uid === coachUid);
                    await db.collection('schedule').doc(id).set({
                        createdByUid: bossUid,
                        assignedToUid: isSub ? effectiveCoach2Uid : coach.uid,
                        boss: bossName,
                        course: '籃球基礎班',
                        location: '九龍灣體育館',
                        start: '09:00', end: '11:00',
                        date, isOneOff: true,
                        courseId: courseAId, isFromCourse: true,
                        originalCoachUid: isSub ? coachUid : null,
                        isSub: isSub,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    seededIds.schedule.push(id);
                    schCount++;
                }
            }
            print(`  ✓ 籃球基礎班 ${courseADates.length * coaches1.length} 個排課（含 1 個代課）`, 'ok');

            // 課程 B 排課（2 位教練）
            const courseBCoaches = [coachUid, fakeCoaches[1].uid];
            for (const date of courseBDates) {
                for (const cUid of courseBCoaches) {
                    const id = `seed_sch_${Date.now()}_${schCount}`;
                    await db.collection('schedule').doc(id).set({
                        createdByUid: bossUid,
                        assignedToUid: cUid,
                        boss: bossName,
                        course: '進階訓練班',
                        location: '沙田體育館',
                        start: '14:00', end: '16:00',
                        date, isOneOff: true,
                        courseId: courseBId, isFromCourse: true,
                        originalCoachUid: null, isSub: false,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    seededIds.schedule.push(id);
                    schCount++;
                }
            }
            print(`  ✓ 進階訓練班 ${courseBDates.length * 2} 個排課（2位教練）`, 'ok');

            // 課程 C 排課（封存課程，但保留過去排課）
            for (const date of courseCDates) {
                const id = `seed_sch_${Date.now()}_${schCount}`;
                await db.collection('schedule').doc(id).set({
                    createdByUid: bossUid,
                    assignedToUid: coachUid,
                    boss: bossName,
                    course: '青少年週末班',
                    location: '將軍澳體育館',
                    start: '10:00', end: '12:00',
                    date, isOneOff: true,
                    courseId: courseCId, isFromCourse: true,
                    originalCoachUid: null, isSub: false,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                seededIds.schedule.push(id);
                schCount++;
            }
            print(`  ✓ 青少年週末班 ${courseCDates.length} 個排課`, 'ok');

            // 獨立排課（非課程，向後相容測試）
            const standaloneSch = [
                { date:'2026-03-15', start:'09:00', end:'12:00', course:'比賽裁判', location:'伊館' },
                { date:'2026-03-22', start:'14:00', end:'17:00', course:'教練工作坊', location:'香港體院' },
            ];
            for (const s of standaloneSch) {
                const id = `seed_sch_${Date.now()}_${schCount}`;
                await db.collection('schedule').doc(id).set({
                    uid: coachUid,
                    assignedToUid: coachUid,
                    createdByUid: bossUid,
                    boss: bossName,
                    start: s.start, end: s.end,
                    course: s.course, location: s.location,
                    date: s.date, isOneOff: true,
                    courseId: null, isFromCourse: false,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                seededIds.schedule.push(id);
                schCount++;
                print(`  ✓ 獨立排課 ${s.date} ${s.course}`, 'ok');
            }

            // ── 3. 建立打卡記錄 (logs) ──────────────────────────────
            print('\n📝 建立打卡記錄…', 'info');

            // 過去嘅日期建立打卡記錄（模擬教練已打卡）
            const today = new Date();
            const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

            const logsData = [];

            // 課程 A 已過去日期嘅打卡（Coach 1）
            courseADates.filter(d => d < todayStr).slice(0, 12).forEach(d => {
                logsData.push({ uid: coachUid, date: d, start: '09:00', end: '11:00', course: '籃球基礎班', location: '九龍灣體育館', isSub: false, note: '' });
            });

            // Coach 2 打卡
            courseADates.filter(d => d < todayStr).slice(0, 8).forEach(d => {
                logsData.push({ uid: effectiveCoach2Uid, date: d, start: '09:00', end: '11:00', course: '籃球基礎班', location: '九龍灣體育館', isSub: false, note: '' });
            });

            // 課程 B 已過去日期嘅打卡
            courseBDates.filter(d => d < todayStr).slice(0, 8).forEach(d => {
                logsData.push({ uid: coachUid, date: d, start: '14:00', end: '16:00', course: '進階訓練班', location: '沙田體育館', isSub: false, note: '' });
            });

            // 代課記錄
            logsData.push({ uid: effectiveCoach2Uid, date: '2026-02-17', start: '09:00', end: '11:00', course: '籃球基礎班', location: '九龍灣體育館', isSub: true, note: '代課' });

            let logCount = 0;
            for (const l of logsData) {
                const id = `seed_log_${Date.now()}_${logCount}`;
                try {
                    await db.collection('logs').doc(id).set({
                        uid: l.uid,
                        bossUid,
                        boss: bossName,
                        date: l.date, start: l.start, end: l.end,
                        hours: calcHours(l.start, l.end),
                        course: l.course, location: l.location,
                        isSub: l.isSub, note: l.note,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    seededIds.logs.push(id);
                    logCount++;
                } catch(e) {
                    print(`  ✗ log ${l.date}: ${e.message}`, 'err');
                }
            }
            print(`  ✓ ${logCount} 筆打卡記錄`, 'ok');

            // ── 完成 ────────────────────────────────────────────────
            print(`\n🎉 完成！共注入：`, 'info');
            print(`   👤 ${seededIds.users.length} 個假教練用戶`, 'info');
            print(`   📚 ${seededIds.courses.length} 個課程`, 'info');
            print(`   📅 ${schCount} 個排課條目`, 'info');
            print(`   📝 ${logCount} 筆打卡記錄`, 'info');
            print('\n請重新整理 app 頁面以查看效果。', 'info');
            document.querySelectorAll('button').forEach(b => b.disabled = false);
        }

        async function clearAll() {
            if (!confirm('確定要刪除所有 seed_ 開頭的測試資料？')) return;
            logEl.innerHTML = '';
            document.querySelectorAll('button').forEach(b => b.disabled = true);
            print('清除測試資料…', 'info');

            const uid = auth.currentUser ? auth.currentUser.uid : '';
            let count = 0;

            // courses & users: simple read rules, can get() all
            for (const col of ['courses', 'users']) {
                try {
                    const snap = await db.collection(col).get();
                    for (const doc of snap.docs) {
                        if (doc.id.startsWith('seed_')) {
                            await doc.ref.delete();
                            print(`  ✓ 刪除 ${col}/${doc.id}`, 'ok');
                            count++;
                        }
                    }
                } catch(e) { print(`  ✗ ${col}: ${e.message}`, 'err'); }
            }

            // logs: must query by bossUid to satisfy read rules
            try {
                const logSnap = await db.collection('logs').where('bossUid', '==', uid).get();
                for (const doc of logSnap.docs) {
                    if (doc.id.startsWith('seed_')) {
                        await doc.ref.delete();
                        print(`  ✓ 刪除 logs/${doc.id}`, 'ok');
                        count++;
                    }
                }
            } catch(e) { print(`  ✗ logs: ${e.message}`, 'err'); }

            // schedule: must query by createdByUid to satisfy read rules
            try {
                const schSnap = await db.collection('schedule').where('createdByUid', '==', uid).get();
                for (const doc of schSnap.docs) {
                    if (doc.id.startsWith('seed_')) {
                        await doc.ref.delete();
                        print(`  ✓ 刪除 schedule/${doc.id}`, 'ok');
                        count++;
                    }
                }
            } catch(e) { print(`  ✗ schedule: ${e.message}`, 'err'); }

            print(`\n完成！共刪除 ${count} 筆測試資料。`, 'info');
            document.querySelectorAll('button').forEach(b => b.disabled = false);
        }
    </script>
</body>
</html>
